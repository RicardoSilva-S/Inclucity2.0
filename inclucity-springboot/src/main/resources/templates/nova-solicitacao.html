<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Solicitação | INCLUCITY 🤝</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" style="min-height: 5rem;">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">INCLUCITY</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/solicitacoes/nova}">Enviar Solicitação</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/solicitacoes/consultar}">Consultar Protocolo</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/solicitacoes/painel}">Painel Gestor</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <h1 class="mb-4 text-success">Registrar Nova Solicitação</h1>
                <p class="text-muted mb-4">Preencha os campos abaixo para registrar sua solicitação.</p>

                <form th:action="@{/solicitacoes/nova}" th:object="${solicitacaoForm}" method="post" class="card p-4 shadow-sm mb-5">

                    <!-- Categoria -->
                    <div class="mb-4">
                        <label for="categoria" class="form-label fw-bold">Categoria da Solicitação</label>
                        <select class="form-select form-select-lg" id="categoria" th:field="*{categoria}" required>
                            <option value="">-- Escolha uma categoria --</option>
                            <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"></option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                    </div>

                    <!-- Descrição -->
                    <div class="mb-4">
                        <label for="descricao" class="form-label fw-bold">Descrição do Problema</label>
                        <textarea class="form-control form-control-lg" id="descricao" th:field="*{descricao}"
                                  rows="5" placeholder="Descreva o problema de forma clara e detalhada" required></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></div>
                    </div>

                    <!-- Localização -->
                    <div class="mb-4">
                        <label for="localizacao" class="form-label fw-bold">Localização (Bairro ou Rua)</label>
                        <input type="text" class="form-control form-control-lg" id="localizacao"
                               th:field="*{localizacao}" placeholder="Ex: Rua das Flores, Bairro Centro" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('localizacao')}" th:errors="*{localizacao}"></div>
                    </div>

                    <!-- Anônimo -->
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="anonima" th:field="*{anonima}">
                            <label class="form-check-label" for="anonima">
                                <strong>Registrar como anônimo</strong>
                            </label>
                        </div>
                        <small class="form-text text-muted">Se marcado, sua solicitação não será identificada.</small>
                    </div>

                    <!-- Dados pessoais (ocultados se anônimo) -->
                    <div id="dadosPessoais">
                        <div class="mb-4">
                            <label for="nomeCidadao" class="form-label fw-bold">Seu Nome</label>
                            <input type="text" class="form-control form-control-lg" id="nomeCidadao"
                                   th:field="*{nomeCidadao}" placeholder="Digite seu nome completo">
                        </div>
                        <div class="mb-4">
                            <label for="contatoCidadao" class="form-label fw-bold">Seu Contato (Telefone ou E-mail)</label>
                            <input type="text" class="form-control form-control-lg" id="contatoCidadao"
                                   th:field="*{contatoCidadao}" placeholder="Ex: (44) 99999-9999 ou seu@email.com">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Enviar Solicitação Agora!</button>
                        <a th:href="@{/}" class="btn btn-light btn-lg">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2026 IncluCity. ODS 11: Cidades e Comunidades Sustentáveis</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("anonima").addEventListener("change", function () {
            document.getElementById("dadosPessoais").style.display = this.checked ? "none" : "block";
        });
    </script>
</body>
</html>
